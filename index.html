<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudySnap</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="background">
        <div class="orb orb-one"></div>
        <div class="orb orb-two"></div>
        <div class="orb orb-three"></div>
        <div class="wave wave-one"></div>
        <div class="wave wave-two"></div>
    </div>

    <aside class="sidebar">
        <div class="logo">S</div>

        <nav>
            <button class="nav-item active">⌂</button>
            <button class="nav-item">◎</button>
            <button class="nav-item">＋</button>
            <button class="nav-item">✦</button>
            <button class="nav-item">▥</button>
            <button class="nav-item">☻</button>
            <button class="nav-item">⚙</button>
        </nav>

        <button class="nav-item bottom">☾</button>
    </aside>

    <main class="page">
        <header class="topbar">
            <h1>Hello StudySnap 🚀</h1>

            <div class="top-actions">
                <button>🔔</button>
                <button>☀</button>
                <div class="avatar">H</div>
            </div>
        </header>

        <section class="hero-card glass">
            <div class="hero-icon">👋</div>

            <div class="hero-content">
                <h2>Welcome back!</h2>
                <p>Track your progress, learn smarter, and achieve more every day.</p>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <span>📘</span>
                    <small>Study Streak</small>
                    <strong>7</strong>
                    <p>days</p>
                </div>

                <div class="stat-card">
                    <span>⚡</span>
                    <small>Today’s XP</small>
                    <strong>450</strong>
                    <p>+12%</p>
                </div>

                <div class="stat-card">
                    <span>🎯</span>
                    <small>Goals</small>
                    <strong>3/5</strong>
                    <p>60%</p>
                </div>

                <div class="stat-card">
                    <span>⭐</span>
                    <small>Flashcards</small>
                    <strong>128</strong>
                    <p>reviewed</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
